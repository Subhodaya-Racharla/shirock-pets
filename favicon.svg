<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background: deep brown circle -->
  <circle cx="32" cy="32" r="32" fill="#3D1F00"/>

  <!-- Paw print in amber — 4 toe pads + main pad -->

  <!-- Top-left toe -->
  <ellipse cx="20" cy="22" rx="5" ry="4" fill="#D47C2F"/>
  <!-- Top-center-left toe -->
  <ellipse cx="28" cy="18" rx="5" ry="4" fill="#D47C2F"/>
  <!-- Top-center-right toe -->
  <ellipse cx="36" cy="18" rx="5" ry="4" fill="#D47C2F"/>
  <!-- Top-right toe -->
  <ellipse cx="44" cy="22" rx="5" ry="4" fill="#D47C2F"/>

  <!-- Main central pad -->
  <ellipse cx="32" cy="38" rx="11" ry="9" fill="#D47C2F"/>
</svg>
